<nav *ngIf="totalPages > 0" aria-label="Page navigation">
  <ul class="pagination justify-content-center">
    <!-- Previous -->
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link prev-btn" (click)="changePage(currentPage - 1)">&lt;</a>
    </li>

    <li class="page-item" *ngIf="pages[0] > 1">
      <a class="page-link" (click)="changePage(1)">1</a>
    </li>
    <li class="page-item " *ngIf="pages[0] > 2">
      <span class="page-link">…</span>
    </li>

    <li *ngFor="let page of pages" class="page-item" [class.active]="page === currentPage">
      <a class="page-link" (click)="changePage(page)">{{ page }}</a>
    </li>

    <li class="page-item" *ngIf="pages[pages.length-1] < totalPages - 1">
      <span class="page-link">…</span>
    </li>
    <li class="page-item" *ngIf="pages[pages.length-1] < totalPages">
      <a class="page-link" (click)="changePage(totalPages)">{{ totalPages }}</a>
    </li>

    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <a class="page-link next-btn" (click)="changePage(currentPage + 1)">&gt;</a>
    </li>
  </ul>
</nav>
