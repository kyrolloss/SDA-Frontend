<div class="container  px-3">
  <div class="row d-flex align-items-center justify-content-between mb-3">
    <div class="col-lg-6 main-title">
      <h3 class="main-title">{{ "Patients" | translate }}</h3>
    </div>
    <div
      class="col-lg-6 col-md-12 d-flex justify-content-end align-items-center"
    >
      <button
        (click)="openAddPatient()"
        class="signin-button w-50 w-auto d-flex align-items-center justify-content-center"
      >
        <mat-icon>add</mat-icon>
        {{ "add_patient" | translate }}
      </button>
    </div>
  </div>
  <app-search
    [(model)]="searchNameValue"
    [placeholder]="'search_patient_name_phone' | translate"
    (search)="onSearch()"
  >
  </app-search>
  <div class="row d-flex align-items-center justify-content-between my-3">
    <div
      class="col-lg-4 col-md-6 col-sm-6 my-3"
      *ngFor="let patient of patients"
    >
      <div class="patient-card">
        <div class="patient-details my-3">
          <div class="title d-flex justify-content-between align-items-center">
            <h5>{{patient.user.fullName}}</h5>
            <!-- <h5>ID: <span>#444</span></h5> -->
          </div>
          <p class="detail">{{ patient.user.phoneNumber }}</p>
          <p class="detail">{{ patient.gender }},{{patient.age}}</p>
          <hr />
          <div
            (click)="goToDetails(patient)"
            class="view-details d-flex align-items-center justify-content-end"
          >
            <h3>{{ "view_details" | translate }}</h3>
            <mat-icon>arrow_forward</mat-icon>
          </div>
        </div>
      </div>
    </div>
    <app-pagination
      [totalItems]="total"
      [pageSize]="limit()"
      [currentPage]="CurrentPage()"
      (pageChange)="onPageChange($event)"
    >
    </app-pagination>
  </div>
</div>

<app-modal
  [isOpen]="isAddPatientModalOpen"
  title="{{ 'add_patient' | translate }}"
  size="medium"
  (close)="closeAddPatient()"
>
  <!-- Body -->
  <div modal-body class="modal-body">
    <form [formGroup]="addPatientForm">
    <div class="form-group">
      <label for="name">{{ "full_name" | translate }}</label>
      <input
        type="text"
        id="name"
        class="form-input"
        formControlName="name"
        placeholder="{{ 'enter_full_name' | translate }}"
      />
    </div>
    <div class="form-group">
      <label for="email">{{ "Email" | translate }}</label>
      <input
        type="email"
        id="email"
        class="form-input"
        formControlName="email"
        placeholder="{{ 'ENTER_EMAIL_ADDRESS' | translate }}"
      />
    </div>
    <div class="form-group">
      <label for="phone_number">{{ "PHONENUMBER" | translate }}</label>
      <input
        type="tel"
        id="phone_number"
        class="form-input"
        formControlName="phone_number"
        placeholder="{{ 'enter_phone_number' | translate }}"
      />
    </div>
    <div class="form-group position-relative">
  <label for="password">{{ "PASSWORD" | translate }}</label>
  
  <input
    [type]="showPassword ? 'text' : 'password'"
    id="password"
    class="form-input pe-5"
    formControlName="password"
    placeholder="{{ 'ENTER_PASSWORD' | translate }}"
  />

  <mat-icon
    class="toggle-password"
    (click)="showPassword = !showPassword"
    style="cursor: pointer;"
  >
    {{ showPassword ? 'visibility_off' : 'visibility' }}
  </mat-icon>
</div>

    <div class="row d-flex align-items-center">
      <div class="col-6">
        <div class="form-group">
          <label for="age">{{ "age" | translate }}</label>
          <input
            type="number"
            id="age"
            class="form-input"
            formControlName="age"
            placeholder="{{ 'enter_age' | translate }}"
          />
        </div>
      </div>
      <div class="col-6">
        <div> <h6> {{"gender" | translate}}</h6></div>
        <div class="d-flex mb-4">
          <button class="action-btn male">{{"male" | translate}}</button>
          <button class="action-btn female">{{"female" | translate}}</button>
        </div>
      </div>
    </div>
    </form>
  </div>

  <!-- Footer -->
  <div modal-footer class="d-flex justify-content-between w-100">
    <div class="w-50 m-1">
      <button class="signin-button">{{ "save" | translate }}</button>
    </div>
    <div class="w-50 m-1">
      <button class="signin-button cancel" (click)="closeAddPatient()">
        {{ "cancel" | translate }}
      </button>
    </div>
  </div>
</app-modal>
