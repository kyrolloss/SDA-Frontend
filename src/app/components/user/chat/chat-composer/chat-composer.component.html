<div class="chat-composer">

  <!-- ─── Voice Recording Mode ──────────────────────────── -->
  <div class="recording-bar" *ngIf="isRecording">
    <span class="rec-dot"></span>
    <span class="rec-timer">{{ formatDuration(recordingDuration) }}</span>
    <span class="rec-label">Recording...</span>
    <div class="rec-actions">
      <button class="rec-cancel" (click)="cancelVoiceRecording()">
        <!-- X icon -->
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Cancel
      </button>
      <button class="rec-send" (click)="stopVoiceRecording()">
        <!-- Send icon -->
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M12.5 1.5L6.5 7.5M12.5 1.5L8.5 12.5L6.5 7.5L1.5 5.5L12.5 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Send
      </button>
    </div>
  </div>

  <!-- ─── Normal Composer ───────────────────────────────── -->
  <div class="composer-bar" *ngIf="!isRecording">

    <!-- Attachment Button -->
    <div class="attachment-wrapper">
      <button
        class="icon-btn attach-btn"
        [class.active]="showAttachmentMenu"
        (click)="toggleAttachmentMenu()"
        [disabled]="!conversationId"
        title="Attach"
      >
        <!-- Paperclip icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M15.5 8.5L8.5 15.5C6.8 17.2 4.1 17.2 2.5 15.5C0.8 13.9 0.8 11.2 2.5 9.5L9.5 2.5C10.6 1.4 12.4 1.4 13.5 2.5C14.6 3.6 14.6 5.4 13.5 6.5L6.5 13.5C6 14 5.1 14 4.6 13.5C4.1 13 4.1 12.1 4.6 11.6L11 5.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Attachment Menu -->
      <div class="attachment-menu" *ngIf="showAttachmentMenu" (clickOutside)="closeAttachmentMenu()">

        <button class="attach-option" (click)="selectAttachment('image')">
          <span class="attach-icon image-icon">
            <!-- Image icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="1.5" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="5.5" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1.5 11L5 7.5L7.5 10L10.5 6.5L14.5 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span>Image</span>
        </button>

        <button class="attach-option" (click)="selectAttachment('file')">
          <span class="attach-icon file-icon">
            <!-- File / PDF icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M9.5 1.5H4C3.2 1.5 2.5 2.2 2.5 3V13C2.5 13.8 3.2 14.5 4 14.5H12C12.8 14.5 13.5 13.8 13.5 13V5.5L9.5 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.5 1.5V5.5H13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.5 9H10.5M5.5 11.5H8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </span>
          <span>File / PDF</span>
        </button>

        <button class="attach-option" (click)="selectAttachment('dicom')">
          <span class="attach-icon dicom-icon">
            <!-- DICOM / waveform icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M3.5 8H5L6.5 5.5L8 11L9.5 7L10.5 8.5H12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span>DICOM</span>
        </button>

        <button class="attach-option" (click)="selectAttachment('voice')">
          <span class="attach-icon voice-icon">
            <!-- Microphone icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="5.5" y="1.5" width="5" height="7" rx="2.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M2.5 8C2.5 11 5 13 8 13C11 13 13.5 11 13.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </span>
          <span>Voice</span>
        </button>

      </div>
    </div>

    <!-- Text Input -->
    <textarea
      #textInput
      class="text-input"
      placeholder="Write a message..."
      [formControl]="textControl"
      (keydown)="onEnterKey($event)"
      (input)="adjustTextareaHeight()"
      rows="1"
      [disabled]="!conversationId"
    ></textarea>

    <!-- Send Button -->
    <button
      class="icon-btn send-btn"
      [class.ready]="canSend"
      (click)="sendText()"
      [disabled]="!canSend"
      title="Send"
    >
      <!-- Send arrow icon -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M16 2L9 9M16 2L11 16L9 9L2 7L16 2Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <!-- ─── Hidden File Inputs ────────────────────────────── -->
  <input #imageInput type="file" accept="image/*"                       style="display:none" (change)="onImageSelected($event)"/>
  <input #fileInput  type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none" (change)="onFileSelected($event)"/>
  <input #dicomInput type="file" accept=".dcm,.dicom"                   style="display:none" (change)="onDicomSelected($event)"/>

</div>
