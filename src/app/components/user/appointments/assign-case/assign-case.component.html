  <div class="case-form mt-4">
    <div class="row">

        <div class="col-md-6 mb-3">
        <label class="form-label">Chief Complaint</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter Chief Complaint"
          [(ngModel)]="chiefComplaint"
          name="chiefComplaint"
        />
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Clinical Investigation</label>
        <select
          class="form-select"
          [(ngModel)]="clinicalInvestigation"
          name="clinicalInvestigation"
        >
          <option value="">Select Investigation</option>
          <option
            *ngFor="let invedtigation of clinicalInvestigations"
            [value]="invedtigation"
          >
            {{ invedtigation }}
          </option>
        </select>
      </div>
      <div class="dropdown custom-dropdown col-md-6 mb-3">
        <label class="form-label">Medication</label>
        <button
          class="btn form-select d-flex justify-content-between align-items-center"
          type="button"
          (click)="toggleDropdown()"
        >
          {{
            selectedMedications.length > 0
              ? selectedMedications.join(", ")
              : "Select Medication"
          }}
          <mat-icon>keyboard_arrow_down</mat-icon>
        </button>

        <div class="dropdown-menu p-3 shadow" [class.show]="dropdownOpen">
          <div class="search-box mb-2">
            <mat-icon class="search-icon">search</mat-icon>
            <input
              type="text"
              class="search-input"
              placeholder="Search medicine name"
              [(ngModel)]="searchTerm"
            />
            <button class="search-btn">
              {{ "Search" | translate }}
            </button>
          </div>
          <div class="med-list">
            <div class="form-check" *ngFor="let med of filteredMedications()">
              <label class="form-check-label" [for]="med">{{ med }}</label>
              <input
                class="form-check-input"
                type="checkbox"
                [id]="med"
                [value]="med"
                (change)="toggleSelection(med, $event)"
                [checked]="selectedMedications.includes(med)"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Diseases</label>
        <select class="form-select" [(ngModel)]="disease" name="disease">
          <option value="">Select Disease</option>
          <option *ngFor="let dis of diseases" [value]="dis">
            {{ dis }}
          </option>
        </select>
      </div>
    </div>

    <!-- <div class="d-flex justify-content-end mt-4 pb-3">
      <button class="btn me-2 save-btn">Save</button>
      <button class="btn cancel-btn">Cancel</button>
    </div> -->
    <div class="page-footer-btns">
  <button class="send-to-patient-btn">{{"Save" | translate}}</button>
  <button class="cancel-btn">{{"cancel" | translate}}</button>
</div>
  </div>
</div>
