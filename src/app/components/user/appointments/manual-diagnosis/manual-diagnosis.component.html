<div class="container manual-diagnosis-container">
  <div class="d-flex align-items-center mb-2">
    <p class="mb-0 route">{{ "appointments" | translate }}</p>

    <a
      class="m-0 p-0 text-black mt-1 mx-1 clinicActive arrow-color"
      style="cursor: pointer"
    >
      <mat-icon>keyboard_arrow_left</mat-icon>
    </a>
    <div class="d-flex align-items-center mb-2">
      <p class="mb-0 route">{{ "start case" | translate }}</p>
    </div>
    <a
      class="m-0 p-0 text-black mt-1 mx-1 clinicActive arrow-color"
      style="cursor: pointer"
      [routerLink]="['/dashboard/appointments/start-case']"
    >
      <mat-icon>keyboard_arrow_left</mat-icon>
    </a>
    <div class="d-flex align-items-center mb-2">
      <p class="mb-0 clinicActive">{{ "manual diagnosis" | translate }}</p>
    </div>
  </div>
  <div class="static3dModel">
    <img src="../../../../../assets/media/static-3dModel.png" alt="3d-model" />
  </div>
  <div class="row mt-2">
    <div class="col-md-6 mb-3">
      <label class="form-label">{{ "Diagnosis Name" | translate }}</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter Diagnosis Name"
        [(ngModel)]="diagnosisName"
        name="diagnosisName"
      />
    </div>
    <div class="col-md-6 mb-3">
  <label class="form-label">Medications</label>

  <div class="dropdown-wrapper">
    <!-- Dropdown Button -->
    <button
      class="form-select d-flex justify-content-between align-items-center"
      (click)="toggleDropdown()"
    >
      {{ selectedMedication || "Select Medications" }}
      <mat-icon>
        {{ isDropdownOpen ? "keyboard_arrow_up" : "keyboard_arrow_down" }}
      </mat-icon>
    </button>

    <!-- Dropdown Content -->
    <div class="dropdown-content shadow" *ngIf="isDropdownOpen">
      <div class="medications-dropdown">
        <!-- Repeat each medicine -->
        <div
          class="medication-item"
          *ngFor="let med of medications; let i = index"
        >
          <div class="med-header" (click)="toggleMed(i)">
            <span>{{ med.name }}</span>
            <mat-icon>
              {{ openIndex === i ? "keyboard_arrow_up" : "keyboard_arrow_down" }}
            </mat-icon>
          </div>

          <div class="med-body" *ngIf="openIndex === i">
            <div class="row">
              <div class="col-md-6 mb-2">
                <label>Dosage</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter dosage"
                  [(ngModel)]="med.dosage"
                />
              </div>

              <div class="col-md-6 mb-2">
                <label>Frequency (times per day)</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter frequency"
                  [(ngModel)]="med.frequency"
                />
              </div>

              <div class="col-md-12 mb-2">
                <label>Duration (days)</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter duration"
                  [(ngModel)]="med.duration"
                />
              </div>

              <div class="col-md-12 d-flex align-items-center mt-2">
                <label class="me-2">Drug Interaction?</label>
                <div
                  class="status-indicator"
                  [ngClass]="{ safe: med.safe, danger: !med.safe }"
                ></div>
                <span class="ms-2">{{ med.safe ? "Safe" : "Unsafe" }}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="add-btn-wrapper">
          <button class="add-btn">Add</button>
          <button class="cancel-btn" (click)="toggleDropdown()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>



       <div class="col-md-6 mb-3">
      <label class="form-label">Treatment plan</label>
      <textarea
        class="form-control"
        rows="6"
        placeholder="Enter Treatment plan"
        [(ngModel)]="treatmentPlan"
        name="treatmentPlan"
      ></textarea>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Instruction between visits</label>
      <textarea
        class="form-control"
        rows="6"
        placeholder="Enter Instruction between visits"
        [(ngModel)]="instructionBetweenVisits"
        name="instructionBetweenVisits"
      ></textarea>
    </div>
  </div>
 <div class="page-footer-btns">
  <button class="send-to-patient-btn">{{"Send to patient" | translate}}</button>
  <button class="cancel-btn" [routerLink]="['/dashboard/appointments/start-case/manual-diagnosis']">{{"cancel" | translate}}</button>
</div>

</div>
