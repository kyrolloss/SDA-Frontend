<div class="appointments-container p-3 container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>{{ "Clinics" | translate }}</h3>

    <div class="select-date d-flex align-items-center">
      <span class="page-item" [class.disabled]="currentDate <= today">
        <a class="page-link" (click)="changeWeek(-1)">&lt;</a>
      </span>

      <button class="date-btn me-3">
        {{ currentDate | date : "dd MMM yyyy" }}
      </button>
      <span class="page-item">
        <a class="page-link" (click)="changeWeek(1)">&gt;</a>
      </span>
    </div>

    <div class="d-flex align-items-center">
      <button class="btn new-appointment-btn">
        + {{ "New Appointment" | translate }}
      </button>
    </div>
  </div>

<div class="search-wrapper d-flex justify-content-center mb-3">
  <div class="search-box">
    <mat-icon class="search-icon">search</mat-icon>
    <input
      type="text"
      class="search-input"
      placeholder="Search clinic name"
    />
    <button class="search-btn" >
      {{ 'Search' | translate }}
    </button>
  </div>
</div>
  <div class="week-days d-flex mb-3">
    <div
      *ngFor="let day of weekDays"
      class="day-box"
      [class.selected]="isSelected(day.date)"
      (click)="selectDay(day.date)"
    >
      <div class="day-label">{{ day.label }}</div>
      <div class="day-date">{{ day.date | date : "dd" }}</div>
    </div>
  </div>

  <div class="calendar">
    <div class="time-column">
      <div class="time-slot">8 AM</div>
      <div class="time-slot">9 AM</div>
      <div class="time-slot">10 AM</div>
      <div class="time-slot">11 AM</div>
      <div class="time-slot">12 PM</div>
      <div class="time-slot">1 PM</div>
      <div class="time-slot">2 PM</div>
      <div class="time-slot">3 PM</div>
      <div class="time-slot">4 PM</div>
      <div class="time-slot">5 PM</div>
    </div>

    <div class="appointments-area">
      <!-- Grid lines for visual structure -->
      <div class="grid-lines">
        <div class="grid-line" *ngFor="let time of timeSlots"></div>
      </div>

      <!-- Appointments -->
      <div
        class="appointment-card"
        *ngFor="let appt of appointments; let i = index"
        [style.top.px]="getAppointmentTop(appt)"
        [style.left.px]="20 + i * 30"
      >
        <div class="appointment-name">{{ appt.name }}</div>
        <p class="appointment-time">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 25"
            fill="none"
          >
            <path
              d="M12 0.5C18.6274 0.5 24 5.87258 24 12.5C24 19.1274 18.6274 24.5 12 24.5C5.37258 24.5 0 19.1274 0 12.5C0 5.87258 5.37258 0.5 12 0.5ZM12 2.17442C6.29734 2.17442 1.67442 6.79734 1.67442 12.5C1.67442 18.2027 6.29734 22.8256 12 22.8256C17.7027 22.8256 22.3256 18.2027 22.3256 12.5C22.3256 6.79734 17.7027 2.17442 12 2.17442ZM10.8837 7.19767C11.3461 7.19767 11.7209 7.57251 11.7209 8.03488V13.8953H17.5814C18.0438 13.8953 18.4186 14.2702 18.4186 14.7326C18.4186 15.1949 18.0438 15.5698 17.5814 15.5698H10.8837C10.4213 15.5698 10.0465 15.1949 10.0465 14.7326V8.03488C10.0465 7.57251 10.4213 7.19767 10.8837 7.19767Z"
              fill="#85775F"
            />
          </svg>
          <span class="ms-1 mt-1">{{ appt.time }}</span>
        </p>
      </div>
    </div>
  </div>
</div>
