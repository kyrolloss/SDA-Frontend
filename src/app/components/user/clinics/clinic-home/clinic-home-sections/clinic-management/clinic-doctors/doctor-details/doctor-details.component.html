<div class="profile-detaild container py-3">
  <div class="bg-profile">

    <div class="d-flex justify-content-between align-items-center first-section">
      <div class="d-flex align-items-center route-container">
        <div class="d-flex align-items-center">
          <p class="mb-0 route">{{ "Clinic" | translate }}</p>
          <a [routerLink]="['/dashboard/clinics']" class="m-0 p-0 text-white mt-1 mx-1 clinicActive arrow-color"
            style="cursor: pointer">
            <mat-icon>keyboard_arrow_left</mat-icon>
          </a>
          <p class="mb-0 route">{{ "Doctors" | translate }}</p>
          <a [routerLink]="['/dashboard/clinics', clinicId, 'management', 'clinic-doctors']"
            class="m-0 p-0 text-white mt-1 mx-1 clinicActive arrow-color" style="cursor: pointer">
            <mat-icon>keyboard_arrow_left</mat-icon>
          </a>
          <p class="mb-0 clinicActive">{{ "Details" | translate }}</p>
        </div>
      </div>
    </div>
    <div class="d-flex flex-column justify-content-center align-items-center">
      <img class="pic-profile" src="../../../../../../../../../assets/media/pic-not-found.png" alt="user picture"
        srcset="">
        <p class="my-0 py-0 fs-5 fw-bold text-white">Ali omar</p>
        <p class="my-0 py-0 fs-5 fw-bold text-white">Dental implant and prosthetic specialist</p>
    </div>
      <div class="d-flex justify-content-center align-items-center mt-3">
        <div class="d-flex align-items-center flex-column">
        <img class="icon-bg" src="../../../../../../../../../assets/media/phone-rounded-svgrepo-com (3) 1.svg" alt="">
        <p class="my-0 py-0 fs-5 text-white">+20123456789</p>
      </div>
      <div class="d-flex align-items-center flex-column ms-4">
        <img class="icon-bg" src="../../../../../../../../../assets/media/email-svgrepo-com (15) 1.svg" alt="">
        <p class="my-0 py-0 fs-5 text-white">aliomarGmail.com</p>
      </div>
      </div>

  </div>
