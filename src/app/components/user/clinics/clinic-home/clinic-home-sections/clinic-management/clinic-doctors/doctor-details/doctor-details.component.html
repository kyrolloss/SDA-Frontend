<div class="profile-detaild container py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center mb-3 route-container">
      <div class="d-flex align-items-center mb-2">
        <p class="mb-0 route">{{ "Clinic" | translate }}</p>
        <a [routerLink]="['/dashboard/clinics']" class="m-0 p-0 text-black mt-1 mx-1 clinicActive arrow-color"
          style="cursor: pointer">
          <mat-icon>keyboard_arrow_left</mat-icon>
        </a>
        <p class="mb-0 clinicActive">{{ "Doctors" | translate }}</p>
        <a [routerLink]="['/dashboard/clinics', clinicId, 'management', 'clinic-doctors']"
          class="m-0 p-0 text-black mt-1 mx-1 clinicActive arrow-color"
          style="cursor: pointer">
          <mat-icon>keyboard_arrow_left</mat-icon>
        </a>
        <p class="mb-0 clinicActive">{{ "Details" | translate }}</p>
      </div>
    </div>
  </div>
</div>
