<div class="container py-3">
  <!-- Back + Title -->
  <div class="d-flex align-items-center mb-3">
        <h5 class="fw-bold mb-0">{{ 'Clinic' | translate }}</h5>

    <a [routerLink]="['/dashboard/clinics']" class="m-0 p-0 text-black mt-2 arrow-color" style="cursor:pointer;">
      <mat-icon>keyboard_arrow_left</mat-icon>
    </a>
    <h5 class="fw-bold mb-0">{{ 'Join Clinics' | translate }}</h5>
  </div>

  <!-- Search -->
  <div class="d-flex justify-content-center align-items-center mb-4">
    <div class="input-group w-50 search-responsive">
      <input type="text" class="form-control" placeholder="Find clinics within 20 km around you" />
      <button class="btn btn-search px-4">{{ 'Search' | translate }}</button>
    </div>
  </div>

  <!-- Clinic List -->
  <div *ngFor="let clinic of clinics" class="clinic-card d-flex justify-content-between align-items-center p-3 mb-3 shadow-sm">
    <div>
      <h6 class="mb-1">{{ clinic.name }}</h6>
      <small class="text-muted">{{ clinic.address }}</small>
    </div>
    <div>
      <button class="btn btn-outline-owner me-2">Owner</button>
      <button class="btn btn-outline-subowner me-2">Sub-Owner</button>
      <button class="btn btn-outline-operator">Operator</button>
    </div>
  </div>
</div>
