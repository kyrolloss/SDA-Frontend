<div class="home-container">
  <header>
    <nav>
      <div class="row d-flex align-items-center">
        <div class="col-md-3 logo-background" [class.logo-ar]="currentLang === 'ar'">
          <img src="../../../../assets/media/logo.svg" alt="" srcset="" />
        </div>
        <div
          class="col-md-9 d-flex justify-content-between px-5 m-auto align-items-center"
        >
          <div class="">
            <ul>
              <li>
                <a
                  (click)="scrollToSection('home')"
                  [class.active]="activeSection === 'home'"
                >
                  {{ "HOME" | translate }}</a
                >
              </li>
              <li>
                <a
                  (click)="scrollToSection('about')"
                  [class.active]="activeSection === 'about'"
                  >{{ "ABOUT" | translate }}</a
                >
              </li>
              <li>
                <a
                  (click)="scrollToSection('pricing')"
                  [class.active]="activeSection === 'pricing'"
                  >{{ "PRICING" | translate }}</a
                >
              </li>
              <li>
                <a
                  (click)="scrollToSection('contact')"
                  [class.active]="activeSection === 'contact'"
                  >{{ "CONTACT" | translate }}</a
                >
              </li>
              <li (click)="toggleLang()" style="cursor: pointer">
                <span>

                    xmlns="http://www.w3.org/2000/svg"

                    : 'Switch to light mode'

                <svg

                  class="moon-icon"
                  fill="currentColor"
                  viewBox="0 0 24 24"

                  />
                </svg>
              </li>
            </ul>
          </div>
          <div>
            <ul>
              <li>
                <button class="signInBtn" (click)="navigateToLogin()">{{ "SIGNIN" | translate }}</button>
              </li>
              <li>
                <button class="JoinUsBtn">{{ "JOIN" | translate }}</button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>
