name: Build and Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Inject secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT: ${{ secrets.FIREBASE_MEASUREMENT }}
          VAPID_KEY: ${{ secrets.VAPID_KEY }}
        run: |
          envsubst < src/environments/environment.ts > tmp.ts && mv tmp.ts src/environments/environment.ts
          envsubst < src/environments/environment.prod.ts > tmp.ts && mv tmp.ts src/environments/environment.prod.ts

      - name: Build Angular
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist/sda/browser
          vercel-args: '--prod'